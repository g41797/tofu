name: macOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build and test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - run: zig build test -freference-trace --summary all -Doptimize=Debug
      - run: zig build test -freference-trace --summary all -Doptimize=ReleaseSafe
      - run: zig build test -freference-trace --summary all -Doptimize=ReleaseFast
      - run: zig build test -freference-trace --summary all -Doptimize=ReleaseSmall
      - run: zig build test -freference-trace --summary all -Doptimize=Debug -Dnetwork=portable
      - run: zig build test -freference-trace --summary all -Doptimize=ReleaseSafe -Dnetwork=portable
      - run: zig build test -freference-trace --summary all -Doptimize=ReleaseFast -Dnetwork=portable
      - run: zig build test -freference-trace --summary all -Doptimize=ReleaseSmall -Dnetwork=portable

